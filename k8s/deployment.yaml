apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-feedback-web
  labels:
    app: atlas-feedback-web
    dxp.io/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-feedback-web
  template:
    metadata:
      labels:
        app: atlas-feedback-web
        backstage.io/kubernetes-id: atlas-feedback-web
    spec:
      nodeSelector:
        role: workload
      tolerations:
      - key: role
        operator: Equal
        value: workload
        effect: NoSchedule
      containers:
      - name: atlas-feedback-web
        image: harbor.harbor.svc.cluster.local/dxp/atlas-feedback-web:3c98692
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-feedback-web
spec:
  selector:
    app: atlas-feedback-web
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-feedback-web
  labels:
    app: atlas-feedback-web
    dxp.io/managed: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: atlas-feedback-web.68.221.5.247.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlas-feedback-web
            port:
              number: 80
